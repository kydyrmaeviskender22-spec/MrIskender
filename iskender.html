<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестовая оболочка | Современный дизайн</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            backdrop-filter: blur(2px);
            transition: all 0.3s ease;
        }

        /* Шапка */
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 30px 20px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.8;
            font-size: 1rem;
        }

        /* Блок авторизации (кнопки по центру) */
        .auth-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            padding: 30px 20px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        .btn {
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59,130,246,0.3);
        }

        .btn-secondary {
            background: #10b981;
            color: white;
        }
        .btn-secondary:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #cbd5e1;
            color: #1e293b;
        }
        .btn-outline:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }

        .user-info {
            margin-left: 20px;
            font-weight: 500;
            background: #e2e8f0;
            padding: 8px 18px;
            border-radius: 40px;
            color: #0f172a;
        }

        /* Панель учителя (тоже центрируем кнопки) */
        .teacher-panel {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            padding: 20px;
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
        }

        /* Контент */
        .content {
            padding: 30px;
            background: #ffffff;
        }

        /* Карточки тестов, вопросов */
        .card {
            background: #ffffff;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid #eef2ff;
            transition: all 0.2s;
        }
        .card:hover {
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }

        .test-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0 16px;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            font-size: 1rem;
            transition: 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        label {
            font-weight: 600;
            color: #334155;
            margin-top: 10px;
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background: #f1f5f9;
            font-weight: 600;
        }

        .hidden {
            display: none;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        @media (max-width: 640px) {
            .container { border-radius: 20px; }
            .content { padding: 20px; }
            .btn { padding: 8px 16px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📚 Тестовая оболочка</h1>
        <p>Создавай, проходи, анализируй — всё в одном месте</p>
    </div>

    <!-- Кнопки входа / выхода (центрированы) -->
    <div class="auth-buttons" id="authButtons">
        <button class="btn btn-primary" onclick="loginTeacher()">👨‍🏫 Вход (учитель)</button>
        <button class="btn btn-secondary" onclick="loginStudent()">👩‍🎓 Вход (студент)</button>
        <button class="btn btn-outline" onclick="logout()">🚪 Выйти</button>
        <span id="userName" class="user-info"></span>
    </div>

    <!-- Панель учителя (по центру) -->
    <div id="teacherPanel" class="teacher-panel hidden">
        <button class="btn btn-primary" onclick="showCreateTestForm()">➕ Создать тест</button>
        <button class="btn btn-secondary" onclick="showTestsList()">📋 Тесты</button>
        <button class="btn btn-outline" onclick="showStatistics()">📊 Статистика</button>
    </div>

    <!-- Основной контент -->
    <div class="content" id="content"></div>
</div>

<script>
    // Хранилище
    let tests = JSON.parse(localStorage.getItem('tests_design')) || [];
    let results = JSON.parse(localStorage.getItem('results_design')) || [];
    let currentUser = null;

    function save() {
        localStorage.setItem('tests_design', JSON.stringify(tests));
        localStorage.setItem('results_design', JSON.stringify(results));
    }

    // Вход
    function loginTeacher() {
        currentUser = { name: 'Учитель', role: 'teacher' };
        document.getElementById('userName').innerText = 'Учитель';
        document.getElementById('teacherPanel').classList.remove('hidden');
        showTestsList();
    }
    function loginStudent() {
        currentUser = { name: 'Студент', role: 'student' };
        document.getElementById('userName').innerText = 'Студент';
        document.getElementById('teacherPanel').classList.add('hidden');
        showTestsList();
    }
    function logout() {
        currentUser = null;
        document.getElementById('userName').innerText = '';
        document.getElementById('teacherPanel').classList.add('hidden');
        document.getElementById('content').innerHTML = '<div class="card" style="text-align:center"><p>✨ Выберите вход: Учитель или Студент ✨</p></div>';
    }

    // Показать список тестов
    function showTestsList() {
        if (!currentUser) return;
        let html = '<h2 style="margin-bottom:20px">📋 Доступные тесты</h2>';
        if (tests.length === 0) {
            html += '<div class="card"><p>Пока нет тестов. Учитель может создать первый тест.</p></div>';
        } else {
            tests.forEach(test => {
                html += `<div class="card">
                            <div class="test-title">${escapeHtml(test.title)}</div>
                            <div class="flex-between">
                                <span>📝 ${test.questions.length} вопросов</span>
                                <button class="btn btn-primary" onclick="startTest(${test.id})">▶ Пройти тест</button>
                            </div>
                         </div>`;
            });
        }
        document.getElementById('content').innerHTML = html;
    }

    // Создание теста (всё на странице, без prompt)
    let currentTestQuestions = [];
    function showCreateTestForm() {
        currentTestQuestions = [];
        let html = `
            <h2>➕ Создание нового теста</h2>
            <div class="card">
                <label>Название теста</label>
                <input type="text" id="testTitle" placeholder="Например: Основы Python">
                <div id="questionsArea"></div>
                <div style="display: flex; gap: 12px; margin-top: 20px;">
                    <button class="btn btn-primary" onclick="addQuestionForm()">➕ Добавить вопрос</button>
                    <button class="btn btn-secondary" onclick="saveTest()">💾 Сохранить тест</button>
                    <button class="btn btn-outline" onclick="showTestsList()">Отмена</button>
                </div>
            </div>
        `;
        document.getElementById('content').innerHTML = html;
        renderQuestionsList();
    }

    function renderQuestionsList() {
        let area = document.getElementById('questionsArea');
        if (!area) return;
        if (currentTestQuestions.length === 0) {
            area.innerHTML = '<div class="card"><p>Вопросов пока нет. Нажмите "Добавить вопрос".</p></div>';
            return;
        }
        let qhtml = '';
        currentTestQuestions.forEach((q, idx) => {
            qhtml += `<div class="card">
                        <div class="flex-between">
                            <strong>Вопрос ${idx+1}</strong>
                            <button class="btn btn-outline" onclick="removeQuestion(${idx})">Удалить</button>
                        </div>
                        <p>📌 ${escapeHtml(q.text)}</p>
                        <p>🔹 Тип: ${q.type === 'single' ? 'Одиночный выбор' : 'Числовой ответ'}</p>
                        ${q.type === 'single' ? `<p>📋 Варианты: ${q.options.join(', ')}</p><p>✅ Правильный ответ: ${q.correctIndex}</p>` : `<p>🔢 Правильное число: ${q.correctValue}</p>`}
                      </div>`;
        });
        area.innerHTML = qhtml;
    }

    function removeQuestion(idx) {
        currentTestQuestions.splice(idx, 1);
        renderQuestionsList();
    }

    function addQuestionForm() {
        let html = `
            <div class="card" id="newQuestionForm" style="background:#fefce8; border:2px solid #eab308;">
                <h4>Новый вопрос</h4>
                <label>Текст вопроса</label>
                <input type="text" id="qText" placeholder="Например: Что такое переменная?">
                <label>Тип вопроса</label>
                <select id="qType" onchange="toggleQuestionType()">
                    <option value="single">Одиночный выбор</option>
                    <option value="numeric">Числовой ответ</option>
                </select>
                <div id="singleOptionsArea">
                    <label>Варианты ответов (через запятую)</label>
                    <input type="text" id="optionsList" placeholder="Например: 2,4,6">
                    <label>Номер правильного ответа (начиная с 0)</label>
                    <input type="number" id="correctIndex" value="0">
                </div>
                <div id="numericArea" class="hidden">
                    <label>Правильное число</label>
                    <input type="number" id="correctValue" step="any">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button class="btn btn-primary" onclick="addQuestion()">Добавить</button>
                    <button class="btn btn-outline" onclick="cancelAddQuestion()">Отмена</button>
                </div>
            </div>
        `;
        let area = document.getElementById('questionsArea');
        area.insertAdjacentHTML('beforeend', html);
        toggleQuestionType();
    }

    function toggleQuestionType() {
        let type = document.getElementById('qType')?.value;
        let singleDiv = document.getElementById('singleOptionsArea');
        let numericDiv = document.getElementById('numericArea');
        if (type === 'single') {
            if (singleDiv) singleDiv.classList.remove('hidden');
            if (numericDiv) numericDiv.classList.add('hidden');
        } else {
            if (singleDiv) singleDiv.classList.add('hidden');
            if (numericDiv) numericDiv.classList.remove('hidden');
        }
    }

    function cancelAddQuestion() {
        let form = document.getElementById('newQuestionForm');
        if (form) form.remove();
    }

    function addQuestion() {
        let text = document.getElementById('qText')?.value;
        if (!text) { alert('Введите текст вопроса'); return; }
        let type = document.getElementById('qType')?.value;
        if (type === 'single') {
            let optionsStr = document.getElementById('optionsList')?.value;
            if (!optionsStr) { alert('Введите варианты ответов'); return; }
            let options = optionsStr.split(',').map(s => s.trim());
            let correctIndex = parseInt(document.getElementById('correctIndex')?.value);
            if (isNaN(correctIndex) || correctIndex < 0 || correctIndex >= options.length) {
                alert('Номер правильного ответа неверен');
                return;
            }
            currentTestQuestions.push({ text, type, options, correctIndex });
        } else if (type === 'numeric') {
            let correctValue = parseFloat(document.getElementById('correctValue')?.value);
            if (isNaN(correctValue)) { alert('Введите правильное число'); return; }
            currentTestQuestions.push({ text, type, correctValue });
        }
        renderQuestionsList();
        cancelAddQuestion();
    }

    function saveTest() {
        let title = document.getElementById('testTitle')?.value;
        if (!title) { alert('Введите название теста'); return; }
        if (currentTestQuestions.length === 0) { alert('Добавьте хотя бы один вопрос'); return; }
        let newTest = {
            id: Date.now(),
            title: title,
            questions: currentTestQuestions
        };
        tests.push(newTest);
        save();
        alert('Тест сохранён!');
        showTestsList();
    }

    // Прохождение теста
    let currentTest = null;
    let currentAnswers = [];
    let currentQIndex = 0;

    function startTest(testId) {
        let test = tests.find(t => t.id === testId);
        if (!test) return;
        currentTest = test;
        currentAnswers = [];
        currentQIndex = 0;
        showQuestion();
    }

    function showQuestion() {
        if (currentQIndex >= currentTest.questions.length) {
            finishTest();
            return;
        }
        let q = currentTest.questions[currentQIndex];
        let html = `<div class="card"><h2>${escapeHtml(currentTest.title)}</h2><hr><h3>Вопрос ${currentQIndex+1} из ${currentTest.questions.length}</h3><p style="font-size:1.1rem; margin:15px 0">${escapeHtml(q.text)}</p>`;
        if (q.type === 'single') {
            html += `<div>`;
            q.options.forEach((opt, idx) => {
                html += `<label style="display:block; margin-bottom:8px;"><input type="radio" name="answer" value="${idx}"> ${escapeHtml(opt)}</label>`;
            });
            html += `</div>`;
        } else if (q.type === 'numeric') {
            html += `<input type="number" id="numAnswer" placeholder="Введите число" style="width:200px">`;
        }
        html += `<br><div style="margin-top:20px;"><button class="btn btn-primary" onclick="saveAnswer()">Ответить →</button></div></div>`;
        document.getElementById('content').innerHTML = html;
    }

    function saveAnswer() {
        let q = currentTest.questions[currentQIndex];
        let answer = null;
        if (q.type === 'single') {
            let selected = document.querySelector('input[name="answer"]:checked');
            if (!selected) { alert('Выберите ответ'); return; }
            answer = parseInt(selected.value);
        } else if (q.type === 'numeric') {
            let val = document.getElementById('numAnswer')?.value;
            if (val === '') { alert('Введите число'); return; }
            answer = parseFloat(val);
        }
        currentAnswers.push(answer);
        currentQIndex++;
        showQuestion();
    }

    function finishTest() {
        let score = 0;
        for (let i = 0; i < currentTest.questions.length; i++) {
            let q = currentTest.questions[i];
            let userAns = currentAnswers[i];
            if (q.type === 'single') {
                if (userAns === q.correctIndex) score++;
            } else if (q.type === 'numeric') {
                if (Math.abs(userAns - q.correctValue) < 0.001) score++;
            }
        }
        let result = {
            testId: currentTest.id,
            testTitle: currentTest.title,
            userName: currentUser.name,
            score: score,
            maxScore: currentTest.questions.length,
            date: new Date().toLocaleString()
        };
        results.push(result);
        save();
        alert(`✅ Тест завершён! Результат: ${score} из ${currentTest.questions.length}`);
        showTestsList();
    }

    // Статистика для учителя
    function showStatistics() {
        if (!currentUser || currentUser.role !== 'teacher') return;
        let html = '<h2>📊 Статистика</h2><div class="card">';
        if (results.length === 0) {
            html += '<p>Пока нет результатов.</p>';
        } else {
            html += '<table><tr><th>Тест</th><th>Студент</th><th>Баллы</th><th>Дата</th></tr>';
            results.forEach(r => {
                html += `<tr><td>${escapeHtml(r.testTitle)}</td><td>${escapeHtml(r.userName)}</td><td>${r.score}/${r.maxScore}</td><td>${r.date}</td></tr>`;
            });
            html += '</table>';
        }
        html += '</div><button class="btn btn-outline" onclick="showTestsList()">← Назад</button>';
        document.getElementById('content').innerHTML = html;
    }

    // Вспомогательная функция для безопасности
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Инициализация
    logout();
</script>
</body>
</html>
